services:
  deps:
    image: node:22-alpine
    container_name: smartshop-deps
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - admin_node_modules:/workspace/apps/admin/node_modules
      - pnpm_store:/workspace/.pnpm-store
    command: >
      sh -c "corepack enable &&
      pnpm install"

  db:
    image: postgres:16-alpine
    container_name: smartshop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartshop}
      POSTGRES_USER: ${POSTGRES_USER:-smartshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartshop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartshop} -d ${POSTGRES_DB:-smartshop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    container_name: smartshop-api
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      deps:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://smartshop:smartshop@db:5432/smartshop?schema=public}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-4000}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - pnpm_store:/workspace/.pnpm-store
    command: >
      sh -c "corepack enable &&
      pnpm --filter @smartshop/api db:generate &&
      pnpm --filter @smartshop/api db:push &&
      pnpm --filter @smartshop/api dev"

  admin:
    image: node:22-alpine
    container_name: smartshop-admin
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      deps:
        condition: service_completed_successfully
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - admin_node_modules:/workspace/apps/admin/node_modules
      - pnpm_store:/workspace/.pnpm-store
    command: >
      sh -c "corepack enable &&
      pnpm --filter @smartshop/admin dev"

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  admin_node_modules:
  pnpm_store:
